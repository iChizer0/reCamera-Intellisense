name: Build MCP Server

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: recamera-intellisense-mcp

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from Cargo.toml
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          manifest="recamera-intellisense-mcp/Cargo.toml"
          # Parse the [package] `version = "X.Y.Z"` line. Restricted to the
          # [package] table so we don't accidentally pick up a dependency pin.
          version="$(awk '
            /^\[package\]/ { in_pkg = 1; next }
            /^\[/          { in_pkg = 0 }
            in_pkg && /^version[[:space:]]*=/ {
              match($0, /"[^"]+"/)
              print substr($0, RSTART + 1, RLENGTH - 2)
              exit
            }
          ' "$manifest")"
          if [[ -z "$version" ]]; then
            echo "::error file=$manifest::Failed to extract package.version"
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${version} (tag ${tag})"

      - name: Ensure tag does not already exist
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists on origin; bump package.version before publishing."
            exit 1
          fi
          echo "Tag ${TAG} is available."

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: recamera-intellisense-mcp-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: recamera-intellisense-mcp-linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: recamera-intellisense-mcp-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: recamera-intellisense-mcp-windows-x86_64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: recamera-intellisense-mcp

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: recamera-intellisense-mcp
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} staging/
          tar czf ${{ matrix.artifact }}.tar.gz -C staging .
          # Emit a detached SHA-256 digest so the installer can verify the
          # release asset before extraction. File format matches `sha256sum`.
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"
          # Emit a detached SHA-256 digest in `sha256sum`-compatible format
          # (``<hex>  <name>``) so the installer verification path works uniformly.
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -FilePath "${{ matrix.artifact }}.zip.sha256" -Encoding ascii

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            recamera-intellisense-mcp/${{ matrix.artifact }}.tar.gz
            recamera-intellisense-mcp/${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            recamera-intellisense-mcp/${{ matrix.artifact }}.zip
            recamera-intellisense-mcp/${{ matrix.artifact }}.zip.sha256

  release:
    name: Publish GitHub release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: List downloaded assets
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: reCamera Intellisense MCP
          body: ""
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256
            dist/**/*.zip
            dist/**/*.zip.sha256
